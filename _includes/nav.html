<script>
  (() => {
    const params = new URLSearchParams(window.location.search)
    const requestedNav = params.get('nav')
    const storedNav = localStorage.getItem('nav')
    const variants = ['new', 'old', 'full']
    const nav = variants.includes(requestedNav) ? requestedNav : variants.includes(storedNav) ? storedNav : 'new'

    localStorage.setItem('nav', nav)
    document.documentElement.dataset.nav = nav
  })()
</script>

<div data-nav-variant="new">
  {% include nav_new.html %}
</div>

<div data-nav-variant="full">
  {% include nav_full.html %}
</div>

<div data-nav-variant="old">
  {% include nav_old.html %}
</div>

<script>
  (() => {
    const menus = document.querySelectorAll('[data-nav-variant="new"] .nav__menu, [data-nav-variant="full"] .nav__menu')

    menus.forEach((menu) => {
      const searchInput = menu.querySelector('input[type="search"]')

      menu.addEventListener('toggle', () => {
        if (menu.open && searchInput) requestAnimationFrame(() => searchInput.focus({ preventScroll: true }))
      })
    })

    document.addEventListener('click', (event) => {
      menus.forEach((menu) => {
        if (menu.open && !menu.contains(event.target)) menu.open = false
      })
    })

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') {
        menus.forEach((menu) => {
          if (menu.open) {
            menu.open = false
            menu.querySelector('summary').focus()
          }
        })
      }
    })
  })()
</script>
